name: 每日抓取银行股价

on:
  schedule:
    - cron: '30 8 * * 1-5'
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取股价
        run: python fetch_prices.py

      - name: 更新分红
        run: python fetch_dividends.py

      - name: 提交数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json dividends.json
          git diff --staged --quiet || git commit -m "📊 自动更新: $(date '+%Y-%m-%d')"
          git push
